<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcmeExam - Recuperar contraseña</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/recover-password.css">
</head>

<body>

    <main class="main_container">

        <section class="recover_card">

            <div class="logo_box">
                <a href="./login.html">
                    <img src="../Assets/images/logo.png" alt="AcmeExam" class="logo_img">
                </a>
            </div>

            <div class="recover_header">
                <span>Seguridad de cuenta</span>
                <h1>Recuperar contraseña</h1>
                <p>
                    Ingresa tu correo, responde tu pregunta de seguridad y define una nueva contraseña.
                </p>
            </div>

            <form id="recover-form" class="recover_form">

                <div class="form_group">
                    <label for="recover-email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="recover-email" 
                        placeholder="admin@acmeexam.com"
                        required
                    >
                </div>

                <div class="form_group">
                    <label for="security-question">Pregunta de seguridad</label>
                    <select id="security-question" required>
                        <option value="">Selecciona tu pregunta</option>
                        <option value="1">¿Cuál es el nombre de tu primera mascota?</option>
                        <option value="2">¿En qué ciudad nacieron tus padres?</option>
                        <option value="3">¿Cuál es el nombre de tus padres?</option>
                        <option value="4">¿Cuál es el nombre de tu comida favorita?</option>
                        <option value="5">¿Cuál es el nombre de tu colegio de primaria?</option>
                    </select>
                </div>

                <div class="form_group">
                    <label for="security-answer">Respuesta de seguridad</label>
                    <input 
                        type="text" 
                        id="security-answer" 
                        placeholder="Escribe tu respuesta"
                        required
                    >
                </div>

                <div class="form_group">
                    <label for="new-password">Nueva contraseña</label>
                    <input 
                        type="password" 
                        id="new-password" 
                        placeholder="Nueva contraseña"
                        required
                    >
                </div>

                <div class="form_group">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        placeholder="Confirma tu nueva contraseña"
                        required
                    >
                </div>

                <button type="submit" class="btn_recover">
                    Actualizar contraseña
                </button>

            </form>

            <p class="footer_text">
                ¿Recordaste tu contraseña?
                <a href="./login.html">Inicia sesión</a>
            </p>

        </section>

    </main>

    <script src="../JS/storage.js"></script>
    <script src="../JS/recover-password.js"></script>
</body>

</html>
